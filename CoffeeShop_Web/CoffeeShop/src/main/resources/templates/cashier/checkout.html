<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cashier Checkout CoffeeShop</title>

    <!-- Bootstrap CSS - CDN -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <!-- Boxicons CSS - CDN -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css"
    />

    <!-- Global CSS - Variables & Reset -->
    <link rel="stylesheet" th:href="@{/css/style.css}" />

    <!-- Component CSS -->
    <link rel="stylesheet" th:href="@{/css/cashier/sidebar.css}" />
    <link rel="stylesheet" th:href="@{/css/cashier/navbar.css}" />
    <link rel="stylesheet" th:href="@{/css/cashier/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/cashier/checkout.css}" />
  </head>
  <body>
    <!-- Sidebar -->
    <div th:replace="cashier/components/sidebar :: sidebar"></div>

    <!-- Navbar -->
    <nav th:replace="cashier/components/navigator :: navbar"></nav>

    <!-- Main Container -->
    <div class="main-container">
      <!-- Main Content -->
      <main class="main-content">
        <div class="checkout-content">
          <div class="row">
            <!-- DANH SÁCH TÍNH TIỀN -->
            <div class="col-8">
              <div class="card">
                <h4 class="mb-4">Danh sách tính tiền của bàn</h4>

                <!-- Select bàn & Refresh button -->
                <div class="row mb-4">
                  <div class="col-10">
                    <select id="tableSelect" class="form-select">
                      <option value="">-- Chọn bàn cần thanh toán --</option>
                    </select>
                  </div>
                  <div class="col-2">
                    <button
                      id="refreshBtn"
                      class="btn btn-outline-primary w-100"
                    >
                      Tải lại
                    </button>
                  </div>
                </div>

                <!-- Bảng chi tiết hoá đơn -->
                <div
                  class="table-responsive"
                  id="checkoutTableContainer"
                  style="display: none"
                >
                  <table
                    class="table table-bordered table-striped align-middle"
                  >
                    <thead>
                      <tr>
                        <th style="width: 50px; text-align: center">STT</th>
                        <th>Tên nước</th>
                        <th style="width: 130px; text-align: center">SL</th>
                        <th style="width: 110px; text-align: right">Giá</th>
                        <th style="width: 110px; text-align: right">
                          Thành tiền
                        </th>
                        <th style="width: 60px; text-align: center">Xóa</th>
                      </tr>
                    </thead>
                    <tbody id="checkoutItemsBody"></tbody>
                  </table>
                </div>

                <!-- Empty message -->
                <div
                  id="checkoutEmptyMessage"
                  style="text-align: center; color: #999; padding: 40px 20px"
                >
                  Chọn một bàn để xem chi tiết thanh toán
                </div>
              </div>
            </div>

            <!-- HOẠT ĐỘNG THANH TOÁN -->
            <div class="col-4">
              <div class="card" id="checkoutActionCard">
                <h4 class="mb-4">Hoạt động thanh toán</h4>

                <div id="checkoutActionContent" style="display: none">
                  <!-- Thông tin thanh toán -->
                  <div class="payment-info">
                    <div class="info-row">
                      <span class="info-label">Bàn số:</span>
                      <span class="info-value" id="checkoutTableNum"></span>
                    </div>
                    <div class="info-row">
                      <span class="info-label">Tổng số lượng:</span>
                      <span class="info-value" id="checkoutQty"></span>
                    </div>
                    <div
                      class="info-row"
                      style="
                        border-top: 1px solid #e0e0e0;
                        padding-top: 10px;
                        margin-top: 10px;
                      "
                    >
                      <span class="info-label">Thành tiền:</span>
                      <span
                        class="info-value fw-bold"
                        style="color: #d4a574; font-size: 16px"
                        id="checkoutTotal"
                      ></span>
                    </div>

                    <!-- Status Select -->
                    <div class="mb-4" style="margin-top: 20px">
                      <label class="form-label">Tình trạng:</label>
                      <select id="statusSelect" class="form-select">
                        <option value="paid">Thanh toán</option>
                        <option value="cancelled">Huỷ</option>
                      </select>
                    </div>

                    <!-- Buttons -->
                    <div
                      style="display: flex; flex-direction: column; gap: 10px"
                    >
                      <button id="checkoutBtn" class="btn btn-primary w-100">
                        <i class="bx bxs-check-circle"></i> Thanh toán
                      </button>
                      <button
                        id="printCheckoutBtn"
                        class="btn btn-outline-primary w-100"
                      >
                        <i class="bx bxs-printer"></i> In hoá đơn
                      </button>
                    </div>
                  </div>
                </div>

                <div
                  id="checkoutEmptyAction"
                  style="text-align: center; color: #999; padding: 40px 20px"
                >
                  Chọn một bàn để thanh toán
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- Footer -->
      <footer th:replace="admin/components/footer :: footer"></footer>
    </div>

    <!-- Bootstrap JS - CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Component JS -->
    <script th:src="@{/js/cashier/sidebar.js}"></script>
    <script th:src="@{/js/cashier/navbar.js}"></script>
    <!-- Cashier Checkout JS -->
    <script th:inline="javascript">
      // Nạp dữ liệu bàn đang chờ thanh toán thật từ Firebase vào Javascript
      const pendingTables = /*[[${pendingTablesList}]]*/ [];
    </script>
    <script th:src="@{/js/custom-alert.js}"></script>
    <script th:src="@{/js/cashier/checkout.js}"></script>
  </body>
</html>
