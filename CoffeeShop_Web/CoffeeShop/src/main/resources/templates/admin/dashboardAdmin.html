<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - CoffeeShop</title>

    <!-- Bootstrap CSS - CDN -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <!-- Boxicons CSS - CDN -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css"
    />

    <!-- Global CSS - Variables & Reset -->
    <link rel="stylesheet" th:href="@{/css/style.css}" />

    <!-- Component CSS -->
    <link rel="stylesheet" th:href="@{/css/admin/sidebar.css}" />
    <link rel="stylesheet" th:href="@{/css/admin/navbar.css}" />
    <link rel="stylesheet" th:href="@{/css/admin/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/admin/dashboardAdmin.css}" />
  </head>
  <body>
    <!-- Sidebar -->
    <div th:replace="admin/components/sidebar :: sidebar"></div>

    <!-- Navbar -->
    <nav th:replace="admin/components/navigator :: navbar"></nav>

    <!-- Main Container -->
    <div class="main-container">
      <!-- Main Content -->
      <main class="main-content">
        <!-- Content sẽ được thêm vào đây -->
        <div class="dashboard-content">
          <div class="row">
            <div class="col-3">
              <div class="stat-card stat-revenue">
                <div class="stat-icon">
                  <i class="bx bx-money"></i>
                </div>
                <div class="stat-details">
                  <span class="stat-title">Doanh Thu Tháng</span>
                  <h3 class="stat-value" id="statRevenue">24.500.000 đ</h3>
                </div>
              </div>
            </div>
            <div class="col-3">
              <div class="stat-card stat-drinks">
                <div class="stat-icon">
                  <i class="bx bx-coffee-togo"></i>
                </div>
                <div class="stat-details">
                  <span class="stat-title">Thực đơn quán</span>
                  <h3 class="stat-value" id="statDrinks">12 ly</h3>
                </div>
              </div>
            </div>
            <div class="col-3">
              <div class="stat-card stat-staff">
                <div class="stat-icon">
                  <i class="bx bx-user-pin"></i>
                </div>
                <div class="stat-details">
                  <span class="stat-title">Tổng số nhân sự</span>
                  <h3 class="stat-value" id="statStaff">18 người</h3>
                </div>
              </div>
            </div>
            <div class="col-3">
              <div class="stat-card stat-tables">
                <div class="stat-icon">
                  <i class="bx bx-table"></i>
                </div>
                <div class="stat-details">
                  <span class="stat-title">Quản lý Bàn</span>
                  <h3 class="stat-value" id="statTables">24 bàn</h3>
                </div>
              </div>
            </div>
          </div>
          <!-- Placeholder cho nội dung dashboard -->
          <div class="row mt-4">
            <div class="col-8">
              <div class="card" style="padding: 20px">
                <h4 class="text-center">Biểu đồ loại nước bán chạy nhất</h4>
                <div style="position: relative; height: 300px; width: 100%">
                  <canvas id="topDrinksChart"></canvas>
                </div>
              </div>
            </div>

            <div class="col-4">
              <div class="card" style="padding: 20px">
                <h4 class="text-center">Biểu đồ Danh mục nổi bật</h4>
                <div
                  style="
                    position: relative;
                    height: 300px;
                    width: 100%;
                    display: flex;
                    justify-content: center;
                  "
                >
                  <canvas id="categoryChart"></canvas>
                </div>
              </div>
            </div>
          </div>

          <div class="row mt-4 mb-4">
            <div class="col-12">
              <div
                class="card shadow-sm border-0"
                style="padding: 20px; border-radius: 12px"
              >
                <div
                  class="d-flex justify-content-between align-items-center mb-3"
                >
                  <h5 class="text-primary fw-bold m-0">
                    <i class="bx bx-line-chart"></i> Biểu đồ Doanh thu Tổng quan
                  </h5>
                  <select
                    id="revenueFilter"
                    class="form-select w-auto fw-bold text-secondary border-secondary"
                  >
                    <option value="week">Tuần qua</option>
                    <option value="month">Tháng này</option>
                    <option value="year">Năm nay</option>
                  </select>
                </div>
                <div style="position: relative; height: 400px; width: 100%">
                  <canvas id="revenueChart"></canvas>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- Footer -->
      <footer th:replace="admin/components/footer :: footer"></footer>
    </div>

    <!-- Bootstrap JS - CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Component JS -->
    <script th:src="@{/js/admin/sidebar.js}"></script>
    <script th:src="@{/js/admin/navbar.js}"></script>
    <script th:src="@{/js/custom-alert.js}"></script>

    <script th:src="@{/js/chart.umd.min.js}"></script>
    <script th:src="@{/js/admin/dashboardAdmin.js}"></script>
  </body>
</html>
