<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Bàn - CoffeeShop</title>

    <!-- Bootstrap CSS - CDN -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <!-- Boxicons CSS - CDN -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css"
    />

    <!-- Global CSS - Variables & Reset -->
    <link rel="stylesheet" th:href="@{/css/style.css}" />

    <!-- Component CSS -->
    <link rel="stylesheet" th:href="@{/css/admin/sidebar.css}" />
    <link rel="stylesheet" th:href="@{/css/admin/navbar.css}" />
    <link rel="stylesheet" th:href="@{/css/admin/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/admin/table_management.css}" />
  </head>
  <body>
    <!-- Sidebar -->
    <div th:replace="admin/components/sidebar :: sidebar"></div>

    <!-- Navbar -->
    <nav th:replace="admin/components/navigator :: navbar"></nav>

    <!-- Main Container -->
    <div class="main-container">
      <!-- Main Content -->
      <main class="main-content">
        <div class="table-management-content">
          <div class="row">
            <div class="col-12">
              <!-- Danh sách bàn -->
              <div class="card">
                <h4 class="mb-4"><i class="bx bxs-table"></i> Quản lý bàn</h4>

                <div
                  class="alert-message"
                  th:if="${message}"
                  th:class="'alert-message show ' + ${messageType}"
                  th:text="${message}"
                  style="margin-bottom: 20px"
                ></div>

                <!-- Tables Grid -->
                <div class="tables-scroll-container">
                  <div class="tables-grid" id="tablesGrid">
                    <!-- Tables will be generated by JavaScript -->
                  </div>

                  <div class="color-description mt-4">
                    <p style="color: #999; font-size: 0.9rem">
                      <i class="bx bxs-info-circle"></i> Hiển thị tất cả các bàn
                      trong quán
                    </p>
                  </div>
                </div>

                <!-- Pass tables data from Firebase to JavaScript via text content -->
                <div id="tablesData" style="display: none">
                  <th:block th:each="table : ${tables}">
                    <span
                      th:data-table-id="${table.id}"
                      th:text="${table.tableNumber}"
                    ></span>
                  </th:block>
                </div>

                <!-- Quản lý bàn -->
                <div class="card mt-4">
                  <h4 class="mb-4">
                    <i class="bx bxs-plus-circle"></i> Quản lý số bàn
                  </h4>

                  <div class="management-section">
                    <div class="management-box">
                      <h5 class="mb-3">Thêm bàn mới</h5>
                      <form
                        th:action="@{/admin/table_management/add}"
                        method="POST"
                      >
                        <div class="input-group">
                          <button
                            type="submit"
                            id="addTableBtn"
                            class="btn btn-primary"
                            title="Thêm bàn"
                          >
                            <i class="bx bxs-plus"></i> Thêm bàn
                          </button>
                          <span class="ms-3 align-self-center text-muted"
                            >Thêm một bàn mới tự động vào danh sách</span
                          >
                        </div>
                      </form>
                    </div>

                    <hr />

                    <div class="management-box">
                      <h5 class="mb-3">Xóa bàn</h5>
                      <form
                        th:action="@{/admin/table_management/delete}"
                        method="POST"
                        onsubmit="
                          return confirm(
                            'Hành động này không thể hoàn tác. Bạn có chắc chắn muốn xóa bàn này?',
                          );
                        "
                      >
                        <div class="input-group">
                          <input
                            type="number"
                            name="tableNumber"
                            id="removeTableNum"
                            class="form-control"
                            placeholder="Nhập số bàn cần xóa..."
                            min="1"
                            max="999"
                            required
                          />
                          <button
                            type="submit"
                            id="removeTableBtn"
                            class="btn btn-danger"
                            title="Xóa bàn"
                          >
                            <i class="bx bxs-minus"></i> Xóa
                          </button>
                        </div>
                      </form>
                    </div>
                  </div>

                  <div class="stats-info mt-4">
                    <div class="stat-item">
                      <span class="stat-label">Tổng số bàn hiện tại:</span>
                      <span
                        class="stat-value"
                        id="totalTablesCount"
                        th:text="${totalTables}"
                        >0</span
                      >
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- Footer -->
      <footer th:replace="admin/components/footer :: footer"></footer>
    </div>

    <!-- Bootstrap JS - CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Component JS -->
    <script th:src="@{/js/admin/sidebar.js}"></script>
    <script th:src="@{/js/admin/navbar.js}"></script>
    <script th:src="@{/js/custom-alert.js}"></script>
    <!-- Table Management JS -->
    <script th:src="@{/js/admin/table_management.js}"></script>
  </body>
</html>
