<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập - CoffeeShop</title>

    <!-- Boxicons CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css"
    />

    <!-- Login CSS -->
    <link rel="stylesheet" th:href="@{/css/login/login.css}" />
  </head>
  <body>
    <div class="login-container">
      <!-- Left Side - Brand -->
      <div class="login-brand">
        <div class="brand-content">
          <div class="brand-logo">
            <i class="bx bx-coffee"></i>
          </div>
          <h1>CoffeeShop</h1>
          <p>Hệ thống quản lý quán cà phê</p>
        </div>
      </div>

      <!-- Right Side - Login Form -->
      <div class="login-form-container">
        <div class="form-wrapper">
          <!-- Header -->
          <div class="form-header">
            <h2>Đăng Nhập</h2>
          </div>

          <!-- Login Form -->
          <form id="loginForm" class="login-form" method="post" action="/login">
            <!-- Username/Email -->
            <div class="form-group">
              <label for="username">Tài Khoản / Email</label>
              <div class="input-group">
                <i class="bx bx-user"></i>
                <input
                  type="text"
                  id="username"
                  name="username"
                  placeholder="Nhập tài khoản hoặc email"
                  required
                />
              </div>
              <span class="error-message" id="usernameError"></span>
            </div>

            <!-- Password -->
            <div class="form-group">
              <label for="password">Mật Khẩu</label>
              <div class="input-group">
                <i class="bx bx-lock"></i>
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Nhập mật khẩu"
                  required
                />
                <button
                  type="button"
                  class="toggle-password"
                  id="togglePassword"
                >
                  <i class="bx bx-hide"></i>
                </button>
              </div>
              <span class="error-message" id="passwordError"></span>
            </div>

            <!-- Remember Me & Forgot Password -->
            <div class="form-options">
              <div class="remember-me">
                <input type="checkbox" id="rememberMe" name="rememberMe" />
                <label for="rememberMe">Ghi nhớ mật khẩu</label>
              </div>
              <a href="#" class="forgot-password">Quên mật khẩu?</a>
            </div>

            <!-- Login Button -->
            <button type="submit" class="btn-login">
              <span>Đăng Nhập</span>
              <i class="bx bx-arrow-back" style="transform: scaleX(-1)"></i>
            </button>
          </form>

          <!-- Alert Message from Server -->
          <div
            class="alert-message"
            id="alertMessage"
            th:if="${message}"
            th:class="'alert-message show ' + ${messageType}"
            th:text="${message}"
          ></div>

          <!-- Alert Message Client-side -->
          <div class="alert-message" id="alertMessageClient"></div>
        </div>
      </div>
    </div>

    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/dist/boxicons.js"></script>
    <script th:src="@{/js/login.js}"></script>
  </body>
</html>
